<template>
    <lightning-card title="Data Import Wizard" icon-name="standard:record">

        <div class="slds-p-around_medium">

            <!-- Upload Section -->
            <div class="slds-box slds-theme_default slds-m-bottom_medium">
                <h2 class="slds-text-heading_small slds-m-bottom_small">1. Upload CSV File</h2>

                <lightning-file-upload label="Upload CSV File" name="fileUploader" accept={acceptedFormats}
                    onuploadfinished={handleUploadFinished}>
                </lightning-file-upload>
            </div>

            <!-- Object Selection -->
            <div class="slds-box slds-theme_default slds-m-bottom_medium">
                <h2 class="slds-text-heading_small slds-m-bottom_small">2. Select Object</h2>

                <lightning-combobox name="objectSelection" label="Salesforce Object" placeholder="Select an Object"
                    options={salesforceObjects} onchange={handleSelectedObject}>
                </lightning-combobox>
            </div>

            <!-- Field Mapping -->
            <div class="slds-box slds-theme_default slds-m-bottom_medium">
                <h2 class="slds-text-heading_small slds-m-bottom_small">3. Field Mapping</h2>

                <template for:each={fields} for:item="field">
                    <div class="slds-form slds-form_horizontal slds-m-bottom_small" key={field.name}>

                        <div class="slds-form-element">

                            <!-- Label -->
                            <label class="slds-form-element__label slds-truncate" title={field.label}>
                                {field.label}
                            </label>

                            <!-- Control -->
                            <div class="slds-form-element__control">
                                <lightning-combobox variant="label-hidden" placeholder="Map CSV Column"
                                    options={columnSelection} onchange={handleColumnSelection} data-name={field.name}>
                                </lightning-combobox>
                            </div>

                        </div>
                    </div>
                </template>
            </div>

            <!-- Action Button -->
            <div class="slds-align_absolute-center slds-m-top_medium">
                <lightning-button variant="brand" label="Import Data" title="Import CSV Data"
                    onclick={handleImportClick}>
                </lightning-button>
            </div>

        </div>

    </lightning-card>
</template>
